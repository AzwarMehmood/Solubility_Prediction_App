name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest -q
      - name: Build and smoke-test production image
        run: |
          docker build --tag aquasol-ci .
          docker run --rm aquasol-ci python -c "from rdkit import Chem; from rdkit.Chem import Draw; image = Draw.MolToImage(Chem.MolFromSmiles('CCO')); assert image.size == (300, 300)"
